<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Beast Pizza | 18-Inch Mumbai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
        .ai-glow {
            box-shadow: 0 0 20px rgba(255, 77, 0, 0.3);
            border: 1px solid rgba(255, 77, 0, 0.5);
        }
        .loading-dots:after {
            content: ' .';
            animation: dots 1s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { color: rgba(0,0,0,0); text-shadow: .2em 0 0 rgba(0,0,0,0), .4em 0 0 rgba(0,0,0,0); }
            40% { color: #ff4d00; text-shadow: .2em 0 0 rgba(0,0,0,0), .4em 0 0 rgba(0,0,0,0); }
            60% { text-shadow: .2em 0 0 #ff4d00, .4em 0 0 rgba(0,0,0,0); }
            80%, 100% { text-shadow: .2em 0 0 #ff4d00, .4em 0 0 #ff4d00; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const apiKey = ""; // Runtime provides this

        const App = () => {
            const [view, setView] = useState('home');
            const [activeCat, setActiveCat] = useState('Signature Pizzas');
            const [chat, setChat] = useState([{ role: 'bot', text: "Yo! Beast AI yahan hai. ✨ Bolo kya mangau? Thanos try karna hai ya Falcon?" }]);
            const [input, setInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const chatEndRef = useRef(null);

            const menu = {
                "Signature Pizzas": [
                    { id: 1, name: "18\" Falcon Pizza", desc: "Pure veg masterpiece with Onion, Capsicum, and Mushrooms.", price: "₹899", img: "https://images.unsplash.com/photo-1593560708920-61dd98c46a4e?w=500", tag: "Veg Elite" },
                    { id: 2, name: "Thanos Pizza", desc: "Balanced spice, 18-inch legendary power crust.", price: "₹499", img: "https://images.unsplash.com/photo-1513104890138-7c749659a591?w=500", tag: "Bestseller" },
                    { id: 3, name: "Drax Pizza", desc: "[Halal] Chicken seekh & BBQ chicken blast.", price: "₹599", img: "https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=500", tag: "Halal" }
                ],
                "Sides & Starters": [
                    { id: 4, name: "Chicken Cheese Balls", desc: "6pc Golden fried balls stuffed with spicy chicken and melting cheese.", price: "₹140", img: "https://images.unsplash.com/photo-1541529086526-db283c563270?w=500", tag: "Crispy" },
                    { id: 5, name: "Cheesy Lava Bread", desc: "Fresh baked garlic bread with a melting cheese lava core.", price: "₹189", img: "https://images.unsplash.com/photo-1594007654729-407eedc4be65?w=500", tag: "Must Try" }
                ],
                "Beast Shakes": [
                    { id: 6, name: "Nutella Monster", desc: "Dense hazelnut shake with loaded Nutella swirl.", price: "₹199", img: "https://images.unsplash.com/photo-1528740561666-dc2479dc08ab?w=500", tag: "Rich" },
                    { id: 7, name: "Killer Oreo", desc: "Classic thick shake with extra Oreo crunch.", price: "₹159", img: "https://images.unsplash.com/photo-1572490122747-3968b75cc699?w=500", tag: "Thick" }
                ]
            };

            const scrollToBottom = () => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                scrollToBottom();
            }, [chat]);

            const askGemini = async () => {
                if (!input.trim() || isTyping) return;
                const userMsg = input;
                setChat(prev => [...prev, { role: 'user', text: userMsg }]);
                setInput('');
                setIsTyping(true);

                const fetchWithRetry = async (retries = 5, delay = 1000) => {
                    const systemPrompt = `You are the Beast Pizza AI. Tone: Energetic Mumbai Hinglish. 
                    Specialty: 18-inch large pizzas. WhatsApp: 8355815058. 
                    Menu: ${JSON.stringify(menu)}. 
                    Suggest items based on user mood. Be concise and fun.`;

                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: userMsg }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] }
                            })
                        });

                        if (!response.ok) throw new Error('API Error');
                        return await response.json();
                    } catch (err) {
                        if (retries > 0) {
                            await new Promise(r => setTimeout(r, delay));
                            return fetchWithRetry(retries - 1, delay * 2);
                        }
                        throw err;
                    }
                };

                try {
                    const data = await fetchWithRetry();
                    const aiReply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Bhai, net slow hai. WhatsApp kar lo!";
                    setChat(prev => [...prev, { role: 'bot', text: aiReply }]);
                } catch (e) {
                    setChat(prev => [...prev, { role: 'bot', text: "Error aa gaya! WhatsApp 8355815058 pe try karo." }]);
                } finally {
                    setIsTyping(false);
                }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-black relative flex flex-col overflow-x-hidden">
                    <div className="fixed top-6 left-0 right-0 z-[200] flex justify-center px-6">
                        <div onClick={() => setView('chat')} className="ai-glow bg-neutral-900/90 backdrop-blur-md py-3 px-6 rounded-full flex items-center justify-between cursor-pointer w-full max-w-[350px]">
                            <div className="flex items-center gap-3">
                                <div className="w-2.5 h-2.5 bg-orange-600 rounded-full animate-pulse shadow-[0_0_10px_rgba(255,77,0,1)]"></div>
                                <span className="text-[10px] font-extrabold uppercase tracking-widest text-orange-500 italic">Beast AI ✨</span>
                            </div>
                            <span className="text-[9px] font-bold text-white/40 uppercase">AI Recommendation</span>
                        </div>
                    </div>

                    {view === 'home' ? (
                        <div className="pt-24 px-6 pb-32 animate__animated animate__fadeIn">
                            <header className="mb-10 text-center">
                                <h1 className="text-6xl font-extrabold italic tracking-tighter leading-none uppercase">BEAST<br/><span className="text-orange-600">MENU</span></h1>
                                <p className="text-neutral-600 text-[10px] font-bold mt-4 uppercase tracking-[0.4em]">Byculla • Late Night • 4 AM</p>
                            </header>

                            <div className="flex gap-2 overflow-x-auto no-scrollbar mb-8 sticky top-20 bg-black/90 py-3 z-50">
                                {Object.keys(menu).map(cat => (
                                    <button 
                                        key={cat}
                                        onClick={() => setActiveCat(cat)}
                                        className={`px-6 py-3 rounded-full text-[10px] font-black uppercase tracking-widest transition-all whitespace-nowrap ${activeCat === cat ? 'bg-orange-600 text-white shadow-lg' : 'bg-neutral-900 text-neutral-500 border border-white/5'}`}
                                    >
                                        {cat}
                                    </button>
                                ))}
                            </div>

                            <div className="space-y-6">
                                {menu[activeCat].map(item => (
                                    <div key={item.id} className="glass-card rounded-[40px] p-4 flex gap-5 group">
                                        <div className="w-24 h-24 rounded-[30px] overflow-hidden shrink-0 bg-neutral-800 shadow-2xl">
                                            <img src={item.img} alt={item.name} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" />
                                        </div>
                                        <div className="flex-1 flex flex-col justify-center">
                                            <div className="flex justify-between items-start mb-1">
                                                <span className="text-[8px] font-black text-orange-500 uppercase tracking-widest bg-orange-500/10 px-2 py-0.5 rounded-full">{item.tag}</span>
                                                <span className="text-sm font-bold text-neutral-200">{item.price}</span>
                                            </div>
                                            <h4 className="font-black text-lg italic uppercase leading-none mb-1 tracking-tight">{item.name}</h4>
                                            <p className="text-[10px] text-neutral-500 leading-tight line-clamp-2">{item.desc}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ) : (
                        <div className="fixed inset-0 z-[250] bg-black p-6 pt-24 flex flex-col animate__animated animate__slideInUp">
                            <div className="flex justify-between items-center mb-8">
                                <h2 className="text-3xl font-black italic uppercase text-orange-600 leading-none">Beast AI ✨</h2>
                                <button onClick={() => setView('home')} className="w-10 h-10 glass-card rounded-full flex items-center justify-center font-bold">✕</button>
                            </div>
                            <div className="flex-1 overflow-y-auto space-y-4 no-scrollbar pb-6">
                                {chat.map((m, i) => (
                                    <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`max-w-[85%] p-5 rounded-[30px] text-sm ${m.role === 'user' ? 'bg-orange-600 shadow-lg' : 'bg-neutral-900 border border-white/5 text-neutral-300'}`}>
                                            {m.text}
                                        </div>
                                    </div>
                                ))}
                                {isTyping && <div className="text-orange-500 text-[10px] font-black animate-pulse uppercase ml-2 italic loading-dots tracking-widest">Beast thinking</div>}
                                <div ref={chatEndRef} />
                            </div>
                            <div className="mt-auto pb-8 flex gap-3">
                                <input 
                                    className="flex-1 bg-neutral-900 border border-white/10 rounded-2xl py-5 px-6 text-sm outline-none focus:border-orange-500 transition-all placeholder:text-neutral-700" 
                                    placeholder="Suggest some 18-inch pizza..." 
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    onKeyPress={(e) => e.key === 'Enter' && askGemini()}
                                />
                                <button onClick={askGemini} className="w-16 bg-white text-black rounded-2xl flex items-center justify-center font-black active:scale-90 transition-all">
                                    ↑
                                </button>
                            </div>
                        </div>
                    )}

                    <div className="fixed bottom-6 left-0 right-0 px-6 z-[150] flex justify-center">
                        <a href="https://wa.me/918355815058" className="bg-white text-black h-16 w-full max-w-[400px] rounded-[30px] flex items-center justify-center gap-3 font-black uppercase text-[11px] tracking-widest shadow-2xl active:scale-95 transition-all">
                            Order on WhatsApp
                        </a>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
